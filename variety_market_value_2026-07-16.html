        // 绘制单个图表
        function drawChart(groupIndex, seriesGroup) {
            const canvas = document.getElementById('chart' + groupIndex);
            const ctx = canvas.getContext('2d');
            const legend = document.getElementById('legend' + groupIndex);
            
            // 设置canvas尺寸
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * 2;
            canvas.height = rect.height * 2;
            ctx.scale(2, 2);
            
            const padding = { top: 30, right: 40, bottom: 40, left: 60 };
            const chartWidth = canvas.width / 2 - padding.left - padding.right;
            const chartHeight = canvas.height / 2 - padding.top - padding.bottom;
            
            // 计算当前组的数据范围（独立Y轴）
            let minVal = Infinity, maxVal = -Infinity;
            seriesGroup.forEach(s => {
                s.data.forEach(v => {
                    minVal = Math.min(minVal, v);
                    maxVal = Math.max(maxVal, v);
                });
            });
            
            // 添加10%的边距
            const range = maxVal - minVal;
            minVal = minVal - range * 0.1;
            maxVal = maxVal + range * 0.1;
            
            // 绘制网格和坐标轴
            function drawGrid() {
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.lineWidth = 1;
                
                // 横向网格线
                for (let i = 0; i <= 5; i++) {
                    const y = padding.top + (chartHeight / 5) * i;
                    ctx.beginPath();
                    ctx.moveTo(padding.left, y);
                    ctx.lineTo(padding.left + chartWidth, y);
                    ctx.stroke();
                    
                    // Y轴标签
                    const val = maxVal - (maxVal - minVal) / 5 * i;
                    ctx.fillStyle = '#888';
                    ctx.font = '10px sans-serif';
                    ctx.textAlign = 'right';
                    // 根据数值大小选择合适的显示格式
                    const absVal = Math.abs(val);
                    let labelText;
                    if (absVal >= 10000) {
                        labelText = (val / 10000).toFixed(1) + '万';
                    } else if (absVal >= 1000) {
                        labelText = (val / 1000).toFixed(1) + 'k';
                    } else {
                        labelText = val.toFixed(0);
                    }
                    ctx.fillText(labelText, padding.left - 8, y + 3);
                }
                
                // X轴标签（每隔几天显示一个）
                const step = Math.ceil(dates.length / 6);
                ctx.textAlign = 'center';
                ctx.font = '10px sans-serif';
                for (let i = 0; i < dates.length; i += step) {
                    const x = padding.left + (chartWidth / (dates.length - 1)) * i;
                    ctx.fillText(dates[i].slice(5), x, padding.top + chartHeight + 15);
                }
                
                // 零线
                if (minVal < 0 && maxVal > 0) {
                    const zeroY = padding.top + chartHeight * (maxVal / (maxVal - minVal));
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.moveTo(padding.left, zeroY);
                    ctx.lineTo(padding.left + chartWidth, zeroY);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            }
            
            // 绘制曲线
            function drawLines() {
                seriesGroup.forEach((s, idx) => {
                    ctx.strokeStyle = s.color;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    
                    s.data.forEach((val, i) => {
                        const x = padding.left + (chartWidth / (dates.length - 1)) * i;
                        const y = padding.top + chartHeight * ((maxVal - val) / (maxVal - minVal));
                        
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    });
                    
                    ctx.stroke();
                });
            }
            
            // 创建图例
            function createLegend() {
                seriesGroup.forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'legend-item';
                    item.innerHTML = `<div class="legend-color" style="background: ${s.color}"></div><span>${s.name}</span>`;
                    legend.appendChild(item);
                });
            }
            
            drawGrid();
            drawLines();
            createLegend();
        }
        
        // 绘制所有图表
        groups.forEach((group, idx) => drawChart(idx, group));
