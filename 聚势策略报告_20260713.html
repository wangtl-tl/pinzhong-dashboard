        // 排名图表
        function initRankChart() {
            const sorted = [...signalsData].sort((a, b) => Math.abs(b.signal_score) - Math.abs(a.signal_score)).slice(0, 15);
            const chart = echarts.init(document.getElementById('rankChart'));
            chart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, formatter: function(p) { return p[0].name + '<br>得分: ' + p[0].value; } },
                grid: { left: '3%', right: '8%', bottom: '3%', containLabel: true },
                xAxis: { type: 'value', min: -100, max: 100, axisLabel: { formatter: '{value}' } },
                yAxis: { type: 'category', data: sorted.map(d => d.variety + ' ' + d.variety_name).reverse(), axisLabel: { fontSize: 11 } },
                series: [{
                    type: 'bar',
                    data: sorted.map(d => ({
                        value: d.signal_score,
                        itemStyle: { color: d.signal_score > 0 ? '#f5222d' : '#52c41a' }
                    })).reverse()
                }]
            });
        }

        // 散点图
        function initScatterChart() {
            const chart = echarts.init(document.getElementById('scatterChart'));
            const seriesData = signalsData.map(d => [d.long_short_ratio, d.signal_score, d.variety, d.variety_name, d.signal_type]);
            chart.setOption({
                tooltip: {
                    formatter: function(p) {
                        return p.data[2] + ' ' + p.data[3] + '<br>信号: ' + p.data[4] + '<br>多空比: ' + p.data[0].toFixed(2) + '<br>得分: ' + p.data[1].toFixed(2);
                    }
                },
                grid: { left: '3%', right: '4%', bottom: '10%', containLabel: true },
                xAxis: { type: 'value', name: '多空账户比', nameLocation: 'middle', nameGap: 25, min: 0 },
                yAxis: { type: 'value', name: '信号得分', min: -100, max: 100 },
                series: [{
                    type: 'scatter',
                    data: seriesData,
                    symbolSize: function(d) { return Math.max(8, Math.abs(d[1]) / 4); },
                    itemStyle: {
                        color: function(p) {
                            const score = p.data[1];
                            if (score >= 70) return '#f5222d';
                            if (score >= 40) return '#ff7875';
                            if (score <= -70) return '#52c41a';
                            if (score <= -40) return '#95de64';
                            return '#faad14';
                        }
                    }
                }]
            });
        }

        // 饼图
        function initPieChart() {
            const counts = {};
            signalsData.forEach(d => { counts[d.signal_type] = (counts[d.signal_type] || 0) + 1; });
            const chart = echarts.init(document.getElementById('pieChart'));
            chart.setOption({
                tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
                legend: { orient: 'vertical', left: 'left', top: 'center' },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    center: ['60%', '50%'],
                    data: Object.entries(counts).map(([k, v]) => ({ name: k, value: v })),
                    itemStyle: {
                        color: function(p) {
                            const colors = {
                                '强烈看多': '#f5222d', '适度看多': '#ff7875',
                                '中性': '#faad14',
                                '适度看空': '#95de64', '强烈看空': '#52c41a'
                            };
                            return colors[p.name] || '#999';
                        }
                    }
                }]
            });
        }

        // 柱状图
        function initBarChart() {
            const sorted = [...signalsData].sort((a, b) => Math.abs(b.current_net_market_value) - Math.abs(a.current_net_market_value)).slice(0, 15);
            const chart = echarts.init(document.getElementById('barChart'));
            chart.setOption({
                tooltip: { trigger: 'axis', formatter: function(p) { return p[0].name + '<br>市值: ' + p[0].value + '万'; } },
                grid: { left: '3%', right: '4%', bottom: '10%', containLabel: true },
                xAxis: { type: 'category', data: sorted.map(d => d.variety), axisLabel: { rotate: 0 } },
                yAxis: { type: 'value', name: '市值(万)' },
                series: [{
                    type: 'bar',
                    data: sorted.map(d => ({
                        value: d.current_net_market_value,
                        itemStyle: { color: d.current_net_market_value > 0 ? '#f5222d' : '#52c41a' }
                    }))
                }]
            });
        }

        // 更新表格
        function updateTable() {
            const tbody = document.getElementById('tableBody');
            const sorted = [...signalsData].sort((a, b) => Math.abs(b.signal_score) - Math.abs(a.signal_score));
            
            tbody.innerHTML = sorted.map((d, i) => {
                const badgeClass = {
                    '强烈看多': 'strong-long', '适度看多': 'moderate-long',
                    '中性': 'neutral',
                    '适度看空': 'moderate-short', '强烈看空': 'strong-short'
                }[d.signal_type] || 'neutral';
                
                const scorePercent = Math.abs(d.signal_score);
                const scoreColor = d.signal_score > 0 ? 'red' : 'green';
                
                return `<tr>
                    <td class="number">${i + 1}</td>
                    <td><strong>${d.variety}</strong><br><small style="color:#999">${d.variety_name}</small></td>
                    <td><span class="badge ${badgeClass}">${d.signal_type}</span></td>
                    <td>
                        <span class="number ${scoreColor}">${d.signal_score > 0 ? '+' : ''}${d.signal_score}</span>
                        <div class="score-bar"><div class="fill ${scoreColor}" style="width:${scorePercent}%"></div></div>
                    </td>
                    <td class="number ${d.current_net_position > 0 ? 'red' : 'green'}">${d.current_net_position > 0 ? '+' : ''}${d.current_net_position}</td>
                    <td class="number ${d.current_net_market_value > 0 ? 'red' : 'green'}">${d.current_net_market_value > 0 ? '+' : ''}${d.current_net_market_value}</td>
                    <td class="number">${d.long_short_ratio}</td>
                    <td class="number ${d.net_position_change_1d > 0 ? 'red' : 'green'}">${d.net_position_change_1d > 0 ? '+' : ''}${d.net_position_change_1d}%</td>
                    <td class="number ${d.net_position_change_3d > 0 ? 'red' : 'green'}">${d.net_position_change_3d > 0 ? '+' : ''}${d.net_position_change_3d}%</td>
                    <td class="number ${d.net_position_change_5d > 0 ? 'red' : 'green'}">${d.net_position_change_5d > 0 ? '+' : ''}${d.net_position_change_5d}%</td>
                    <td>${d.confidence}</td>
                </tr>`;
            }).join('');
        }

        // 初始化
        initRankChart();
        initScatterChart();
        initPieChart();
        initBarChart();
        updateTable();
    </script>
